<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOP Project - Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <dialog class="new-book-modal" open>
      <div class="modal-wrapper">
        <h2>Add New Book</h2>
        <form method="dialog" id="new-book-form" class="new-book-form">
          <div class="input-row">
            <label for="title">Title</label>
            <input type="text" name="title" id="title" required />
          </div>
          <div class="input-row">
            <label for="author">Author</label>
            <input type="text" name="author" id="author" required />
          </div>
          <div class="input-row">
            <label for="number-pages">No. of Pages</label>
            <input
              type="number"
              name="number-pages"
              id="number-pages"
              required
            />
          </div>
          <fieldset>
            <legend>Read Before?</legend>
            <label for="yes">Yes</label>
            <input type="radio" name="read-before" id="yes" />
            <label for="no">No</label>
            <input type="radio" name="read-before" id="no" checked />
          </fieldset>
        </form>
        <div class="new-book-form-buttons">
          <button class="close-modal-button" type="button">Close</button>
          <button id="submit" type="submit" form="new-book-form">Submit</button>
        </div>
      </div>
    </dialog>

    <table class="library-data">
      <caption>
        Data of books in library
      </caption>
      <thead></thead>
      <tbody></tbody>
    </table>

    <button class="open-modal-button" type="button">Add Book</button>
    <script src="script.js"></script>
  </body>
</html>
