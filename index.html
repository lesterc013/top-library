<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOP Project - Library</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <table class="library-data">
      <caption>
        Data of books in library
      </caption>
      <thead></thead>
      <tbody></tbody>
    </table>
    <dialog class="new-book-modal">
      <button class="close-modal-button" type="button">Close</button>
      <form method="dialog" id="form">
        <p>
          <label for="fav-animal">Favorite animal:</label>
          <select id="fav-animal" name="favAnimal" required>
            <option></option>
            <option>Brine shrimp</option>
            <option>Red panda</option>
            <option>Spider monkey</option>
          </select>
        </p>
        <div>
          <button id="submit" type="submit">Confirm</button>
        </div>
      </form>
    </dialog>
    <button class="open-modal-button" type="button">Add Book</button>
    <script src="script.js"></script>
  </body>
</html>
